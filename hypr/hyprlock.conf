image {
    position = fill
    monitor = DP-1
    halign = center
    valign = center
    position = 0,200
}
background {
    path = ~/dotfiles/wallpapers/mountain-range.jpg
    monitor = DP-1 
}
general {
    ignore_empty_input = true
    immediate_render = true
}

input-field {
    monitor = DP-1
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = Welcome back, Joe
    text_align = center
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = 0xProtoNerd
    rotate = 0
    position = 0, 80
    halign = center
    valign = center

}

label {
    monitor = DP-1
    text = $TIME
    text_align = center
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = 0xProtoNerd
    rotate = 0
    position = 0, 200
    halign = center
    valign = center

}